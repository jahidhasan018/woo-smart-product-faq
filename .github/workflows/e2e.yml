name: E2E — Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run E2E nightly at 2am UTC
    - cron: "0 2 * * *"

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build plugin assets
        run: npm run build

      - name: Start wp-env
        run: npx @wordpress/env start

      - name: Wait for WordPress to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8888; do sleep 2; done'

      - name: Setup WooCommerce test data
        run: |
          npx wp-env run cli wp wc product create \
            --name="Test Product" \
            --type=simple \
            --status=publish \
            --user=admin

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          WP_BASE_URL: http://localhost:8888
          WP_ADMIN_USER: admin
          WP_ADMIN_PASSWORD: password

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop wp-env
        if: always()
        run: npx @wordpress/env stop
