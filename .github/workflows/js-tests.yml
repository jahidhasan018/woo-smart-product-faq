name: JS — ESLint & Jest Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  eslint:
    name: ESLint — JavaScript Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js

  jest:
    name: Jest — Component & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:unit -- --coverage --ci

      - name: Upload JS coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: jest
          fail_ci_if_error: false

  build:
    name: Build — Webpack Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f assets/js/settings.js || (echo "settings.js not built" && exit 1)
          test -f assets/js/frontend.js || (echo "frontend.js not built" && exit 1)
          test -f assets/js/product-metabox.js || (echo "product-metabox.js not built" && exit 1)
